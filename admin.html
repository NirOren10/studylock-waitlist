<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyLock — Waitlist Admin</title>
  <style>
    :root {
      --primary: #534AB7;
      --primary-light: #EEEDFE;
      --success: #1D9E75;
      --bg: #F5F5F7;
      --card: #FFFFFF;
      --border: #E8E8EC;
      --text: #0A0A0A;
      --text-secondary: #636375;
      --text-muted: #9898A8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo a { color: var(--text); text-decoration: none; }
    .badge {
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      padding: 4px 12px;
    }
    main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }
    .stat-value { font-size: 36px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title { font-size: 18px; font-weight: 700; }
    .refresh-btn {
      font-size: 13px;
      color: var(--primary);
      background: var(--primary-light);
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .refresh-btn:hover { opacity: 0.8; }
    .table-wrap {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--bg);
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1.5px solid var(--border);
    }
    td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .position-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      border-radius: 8px;
      padding: 3px 8px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 15px; }
    .export-btn {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .export-btn:hover { background: var(--bg); }
    .actions { display: flex; gap: 8px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🔒 <a href="/">StudyLock</a> <span style="color:#9898A8;font-weight:400">/</span> Waitlist</div>
    <div class="badge" id="count-badge">Loading…</div>
  </header>
  <main>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-value" id="total-count">—</div>
        <div class="stat-label">Total signups</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="today-count">—</div>
        <div class="stat-label">Joined today</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Signups</div>
      <div class="actions">
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        <button class="refresh-btn" onclick="loadSignups()">↻ Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="loading" id="loading">Loading signups…</div>
      <table id="signups-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="signups-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="icon">📭</div>
        <p>No signups yet. Share the link!</p>
      </div>
    </div>
  </main>

  <script>
    let allSignups = [];

    async function loadSignups() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('signups-table').style.display = 'none';
      document.getElementById('empty-state').style.display = 'none';

      try {
        const r = await fetch('/api/signups');
        const { signups, count } = await r.json();
        allSignups = signups;

        document.getElementById('total-count').textContent = count;
        document.getElementById('count-badge').textContent = `${count} signups`;

        const today = new Date().toDateString();
        const todayCount = signups.filter(s => new Date(s.joinedAt).toDateString() === today).length;
        document.getElementById('today-count').textContent = todayCount;

        document.getElementById('loading').style.display = 'none';

        if (signups.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }

        const tbody = document.getElementById('signups-body');
        tbody.innerHTML = signups.slice().reverse().map((s, i) => `
          <tr>
            <td><span class="position-badge">#${signups.length - i}</span></td>
            <td>${esc(s.name)}</td>
            <td>${esc(s.email)}</td>
            <td>${new Date(s.joinedAt).toLocaleString()}</td>
          </tr>
        `).join('');

        document.getElementById('signups-table').style.display = 'table';
      } catch (err) {
        document.getElementById('loading').textContent = 'Failed to load signups. Is the server running?';
      }
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function exportCSV() {
      if (!allSignups.length) return;
      const rows = [['#', 'Name', 'Email', 'Joined At']];
      allSignups.forEach((s, i) => rows.push([i + 1, s.name, s.email, s.joinedAt]));
      const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'studylock-waitlist.csv';
      a.click();
    }

    loadSignups();
    setInterval(loadSignups, 30000);
  </script>
</body>
</html>
